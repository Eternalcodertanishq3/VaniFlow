<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="200">
    <defs>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FF9933" /> <!-- Indian Saffron -->
            <stop offset="50%" stop-color="#E1306C" />
            <stop offset="100%" stop-color="#833AB4" />
        </linearGradient>
        <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#138808" /> <!-- Indian Green -->
            <stop offset="50%" stop-color="#0052D4" />
            <stop offset="100%" stop-color="#4364F7" />
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    
    <rect width="800" height="200" fill="#0D1117" rx="16"/>
    
    <!-- Animated Soundwaves -->
    <g transform="translate(50, 100)">
        <rect x="0" y="-10" width="8" height="20" rx="4" fill="url(#grad1)">
            <animate attributeName="y" values="-10;-30;-10" dur="1.1s" repeatCount="indefinite" />
            <animate attributeName="height" values="20;60;20" dur="1.1s" repeatCount="indefinite" />
        </rect>
        <rect x="16" y="-20" width="8" height="40" rx="4" fill="url(#grad2)">
            <animate attributeName="y" values="-20;-50;-20" dur="1.4s" repeatCount="indefinite" />
            <animate attributeName="height" values="40;100;40" dur="1.4s" repeatCount="indefinite" />
        </rect>
        <rect x="32" y="-15" width="8" height="30" rx="4" fill="url(#grad1)">
            <animate attributeName="y" values="-15;-45;-15" dur="1.2s" repeatCount="indefinite" />
            <animate attributeName="height" values="30;90;30" dur="1.2s" repeatCount="indefinite" />
        </rect>
        <rect x="48" y="-25" width="8" height="50" rx="4" fill="url(#grad2)">
            <animate attributeName="y" values="-25;-60;-25" dur="1.5s" repeatCount="indefinite" />
            <animate attributeName="height" values="50;120;50" dur="1.5s" repeatCount="indefinite" />
        </rect>
        <rect x="64" y="-15" width="8" height="30" rx="4" fill="url(#grad1)">
            <animate attributeName="y" values="-15;-35;-15" dur="1.3s" repeatCount="indefinite" />
            <animate attributeName="height" values="30;70;30" dur="1.3s" repeatCount="indefinite" />
        </rect>
        <rect x="80" y="-10" width="8" height="20" rx="4" fill="url(#grad2)">
            <animate attributeName="y" values="-10;-25;-10" dur="1.1s" repeatCount="indefinite" />
            <animate attributeName="height" values="20;50;20" dur="1.1s" repeatCount="indefinite" />
        </rect>
    </g>

    <!-- Logo Text -->
    <text x="160" y="112" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="60" font-weight="800" fill="#FFFFFF" letter-spacing="-2">
        Vaani<tspan fill="url(#grad1)">Flow</tspan>
    </text>

    <!-- Tagline -->
    <text x="165" y="145" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" fill="#8B949E" font-weight="500" letter-spacing="1.5">
        AUDIO DUBBING &amp; TRANSLATION PIPELINE
    </text>

    <!-- Decorative flow path -->
    <path d="M 540 100 Q 620 50, 700 100 T 850 100" fill="transparent" stroke="url(#grad2)" stroke-width="4" stroke-dasharray="15 15" opacity="0.7" filter="url(#glow)">
        <animate attributeName="stroke-dashoffset" from="100" to="0" dur="3s" repeatCount="indefinite" />
    </path>
    <path d="M 520 120 Q 600 170, 680 120 T 850 120" fill="transparent" stroke="url(#grad1)" stroke-width="3" stroke-dasharray="10 10" opacity="0.5">
        <animate attributeName="stroke-dashoffset" from="0" to="100" dur="4s" repeatCount="indefinite" />
    </path>
</svg>
