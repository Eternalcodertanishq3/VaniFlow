<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="800">
    <defs>
        <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="strongGlow">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <!-- Background -->
    <rect width="800" height="800" fill="#0D1117" rx="24"/>

    <g transform="translate(400, 360)">
        
        <!-- OUTER RING (Rotates CW) -->
        <g>
            <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite" />
            
            <!-- Solid Base Ring -->
            <circle cx="0" cy="0" r="220" fill="none" stroke="#D0D1E6" stroke-width="32" opacity="0.8" />
            
            <!-- Rotating markers (little dots) on the center of the stroke -->
            <circle cx="0" cy="-220" r="4" fill="#1D3557" />
            <circle cx="0" cy="220" r="4" fill="#1D3557" />
            <circle cx="220" cy="0" r="4" fill="#1D3557" />
            <circle cx="-220" cy="0" r="4" fill="#1D3557" />
            
            <!-- Dashed subtle overlay to emphasize rotation (Circumference: 1382.3) -->
            <circle cx="0" cy="0" r="220" fill="none" stroke="#FFFFFF" stroke-width="32" stroke-dasharray="10 335.5" opacity="0.4" />
        </g>

        <!-- MIDDLE RING (Rotates CCW) -->
        <g>
            <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="15s" repeatCount="indefinite" />
            
            <!-- Solid Base Ring -->
            <circle cx="0" cy="0" r="185" fill="none" stroke="#748CAB" stroke-width="34" opacity="0.9" />
            
            <!-- Rotating markers -->
            <circle cx="0" cy="-185" r="4" fill="#FFFFFF" />
            <circle cx="0" cy="185" r="4" fill="#FFFFFF" />
            <circle cx="160.2" cy="92.5" r="4" fill="#FFFFFF" />
            <circle cx="-160.2" cy="-92.5" r="4" fill="#FFFFFF" />
            <circle cx="-160.2" cy="92.5" r="4" fill="#FFFFFF" />
            <circle cx="160.2" cy="-92.5" r="4" fill="#FFFFFF" />

            <!-- Dashed overlay (Circumference: 1162.3 / 6) -->
            <circle cx="0" cy="0" r="185" fill="none" stroke="#1D3557" stroke-width="34" stroke-dasharray="6 187.7" opacity="0.5" />
        </g>

        <!-- INNER RING (Rotates CW) -->
        <g>
            <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="10s" repeatCount="indefinite" />
            
            <!-- Solid Base Ring -->
            <circle cx="0" cy="0" r="152" fill="none" stroke="#3E5C76" stroke-width="28" opacity="0.95" />
            
            <!-- Rotating markers -->
            <circle cx="0" cy="-152" r="4" fill="#FFFFFF" filter="url(#glow)"/>
            <circle cx="0" cy="152" r="4" fill="#FFFFFF" filter="url(#glow)"/>
            <circle cx="152" cy="0" r="4" fill="#FFFFFF" filter="url(#glow)"/>
            <circle cx="-152" cy="0" r="4" fill="#FFFFFF" filter="url(#glow)"/>
            
            <!-- Dashed overlay (Circumference: 955 / 8) -->
            <circle cx="0" cy="0" r="152" fill="none" stroke="#FFFFFF" stroke-width="28" stroke-dasharray="4 115.3" opacity="0.3" />
        </g>

        <!-- CENTER NAVY CIRCLE -->
        <!-- Just 2px gap between this and the inner ring -->
        <circle cx="0" cy="0" r="136" fill="#1D3557" stroke="#457B9D" stroke-width="2" />

        <!-- VERTICAL BARS (Pulsing Soundwave, matching the style from image) -->
        <!-- Center Bar -->
        <rect x="-6" y="-70" width="12" height="140" rx="6" fill="#F1FAEE">
            <animate attributeName="y" values="-70;-90;-70" dur="1s" repeatCount="indefinite" />
            <animate attributeName="height" values="140;180;140" dur="1s" repeatCount="indefinite" />
        </rect>
        
        <!-- Pair 1 -->
        <rect x="-28" y="-55" width="12" height="110" rx="6" fill="#F1FAEE">
            <animate attributeName="y" values="-55;-75;-55" dur="1.2s" repeatCount="indefinite" />
            <animate attributeName="height" values="110;150;110" dur="1.2s" repeatCount="indefinite" />
        </rect>
        <rect x="16" y="-55" width="12" height="110" rx="6" fill="#F1FAEE">
            <animate attributeName="y" values="-55;-45;-55" dur="1.3s" repeatCount="indefinite" />
            <animate attributeName="height" values="110;90;110" dur="1.3s" repeatCount="indefinite" />
        </rect>

        <!-- Pair 2 -->
        <rect x="-50" y="-35" width="12" height="70" rx="6" fill="#F1FAEE">
            <animate attributeName="y" values="-35;-50;-35" dur="1.4s" repeatCount="indefinite" />
            <animate attributeName="height" values="70;100;70" dur="1.4s" repeatCount="indefinite" />
        </rect>
        <rect x="38" y="-35" width="12" height="70" rx="6" fill="#F1FAEE">
            <animate attributeName="y" values="-35;-25;-35" dur="1.5s" repeatCount="indefinite" />
            <animate attributeName="height" values="70;50;70" dur="1.5s" repeatCount="indefinite" />
        </rect>

        <!-- Pair 3 -->
        <rect x="-72" y="-20" width="12" height="40" rx="6" fill="#F1FAEE">
            <animate attributeName="y" values="-20;-30;-20" dur="1.1s" repeatCount="indefinite" />
            <animate attributeName="height" values="40;60;40" dur="1.1s" repeatCount="indefinite" />
        </rect>
        <rect x="60" y="-20" width="12" height="40" rx="6" fill="#F1FAEE">
            <animate attributeName="y" values="-20;-25;-20" dur="1.6s" repeatCount="indefinite" />
            <animate attributeName="height" values="40;50;40" dur="1.6s" repeatCount="indefinite" />
        </rect>

    </g>

    <!-- TEXT -->
    <text x="400" y="660" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif" font-size="72" font-weight="300" fill="#F8FAFC" text-anchor="middle" letter-spacing="4">
        vaaniflow
    </text>
    <text x="400" y="710" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif" font-size="22" font-weight="400" fill="#94A3B8" text-anchor="middle" letter-spacing="2">
        multilingual async dubbing pipeline
    </text>
</svg>
