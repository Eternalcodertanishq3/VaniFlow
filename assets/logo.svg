<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="300">
    <defs>
        <!-- Vibrant Gradients representing transformation -->
        <linearGradient id="flowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#FF512F" /> <!-- Orange/Saffron -->
            <stop offset="50%" stop-color="#DD2476" /> <!-- Magenta -->
            <stop offset="100%" stop-color="#00C9FF" /> <!-- Bright Cyan -->
        </linearGradient>

        <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#FFFFFF" />
            <stop offset="100%" stop-color="#A5B4FC" />
        </linearGradient>

        <!-- Filters for glowing effects -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="softGlow">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="strongGlow">
            <feGaussianBlur stdDeviation="8" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <!-- Deep GitHub Dark Mode Background -->
    <rect width="800" height="300" fill="#0D1117" rx="16"/>

    <!-- Subtle Background Grid/Network for tech feel -->
    <g stroke="#161B22" stroke-width="1" opacity="0.5">
        <line x1="0" y1="50" x2="800" y2="50"/>
        <line x1="0" y1="100" x2="800" y2="100"/>
        <line x1="0" y1="150" x2="800" y2="150"/>
        <line x1="0" y1="200" x2="800" y2="200"/>
        <line x1="0" y1="250" x2="800" y2="250"/>
        <line x1="200" y1="0" x2="200" y2="300"/>
        <line x1="400" y1="0" x2="400" y2="300"/>
        <line x1="600" y1="0" x2="600" y2="300"/>
    </g>

    <!-- Top: Logo Text & Tagline -->
    <text x="400" y="70" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="52" font-weight="900" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">
        VAANI<tspan fill="#DD2476">FLOW</tspan>
    </text>
    <text x="400" y="100" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="500" fill="#8B949E" text-anchor="middle" letter-spacing="2">
        AUDIO DUBBING &amp; TRANSLATION PIPELINE
    </text>

    <!-- Middle: The Interactive Pipeline Flow -->
    <g transform="translate(0, 60)">
        
        <!-- ================= LEFT SIDE: SOURCE AUDIO ================= -->
        <g transform="translate(80, 110)">
            <!-- Outer glowing pulse -->
            <circle cx="0" cy="0" r="30" fill="#FF512F" opacity="0.1" filter="url(#strongGlow)">
                <animate attributeName="r" values="30;40;30" dur="2s" repeatCount="indefinite"/>
                <animate attributeName="opacity" values="0.1;0.2;0.1" dur="2s" repeatCount="indefinite"/>
            </circle>

            <!-- Abstract Microphone Element -->
            <rect x="-8" y="-20" width="16" height="40" rx="8" fill="#FF512F" filter="url(#softGlow)"/>
            <path d="M -16 -5 A 16 16 0 0 0 16 -5" fill="none" stroke="#FF512F" stroke-width="3" stroke-linecap="round"/>
            <line x1="0" y1="11" x2="0" y2="22" stroke="#FF512F" stroke-width="3" stroke-linecap="round"/>
            <line x1="-10" y1="22" x2="10" y2="22" stroke="#FF512F" stroke-width="3" stroke-linecap="round"/>

            <!-- Animated Soundwaves going OUT towards the pipeline -->
            <path d="M 30 -15 Q 40 0 30 15" fill="none" stroke="#FF512F" stroke-width="4" stroke-linecap="round">
                <animate attributeName="opacity" values="0.1;1;0.1" dur="1s" repeatCount="indefinite" />
            </path>
            <path d="M 40 -25 Q 55 0 40 25" fill="none" stroke="#FF512F" stroke-width="4" stroke-linecap="round">
                <animate attributeName="opacity" values="0.1;1;0.1" dur="1s" begin="0.3s" repeatCount="indefinite" />
            </path>
            
            <text x="0" y="55" font-family="sans-serif" font-size="14" font-weight="bold" fill="#FF512F" text-anchor="middle">Source Audio</text>
        </g>


        <!-- ================= RIGHT SIDE: TARGET AUDIO ================= -->
        <g transform="translate(720, 110)">
            <!-- Outer glowing pulse -->
            <circle cx="0" cy="0" r="30" fill="#00C9FF" opacity="0.1" filter="url(#strongGlow)">
                <animate attributeName="r" values="30;40;30" dur="2s" begin="1s" repeatCount="indefinite"/>
                <animate attributeName="opacity" values="0.1;0.2;0.1" dur="2s" begin="1s" repeatCount="indefinite"/>
            </circle>

            <!-- Speaker Icon -->
            <path d="M -15 -12 L -5 -12 L 8 -25 L 8 25 L -5 12 L -15 12 Z" fill="#00C9FF" filter="url(#softGlow)"/>
            
            <!-- Animated Soundwaves going OUT towards the user -->
            <path d="M 20 -15 Q 30 0 20 15" fill="none" stroke="#00C9FF" stroke-width="4" stroke-linecap="round">
                <animate attributeName="opacity" values="0.1;1;0.1" dur="1s" repeatCount="indefinite" />
            </path>
            <path d="M 30 -25 Q 45 0 30 25" fill="none" stroke="#00C9FF" stroke-width="4" stroke-linecap="round">
                <animate attributeName="opacity" values="0.1;1;0.1" dur="1s" begin="0.3s" repeatCount="indefinite" />
            </path>

            <text x="0" y="55" font-family="sans-serif" font-size="14" font-weight="bold" fill="#00C9FF" text-anchor="middle">Target Audio</text>
        </g>


        <!-- ================= THE GLOWING FLOW PIPELINE ================= -->
        <!-- Main bezier curve connecting source, 3 nodes, and target -->
        <!-- x ranges from 140 to 660 -->
        <path d="M 140 110 C 200 110, 230 60, 280 60 S 360 110, 400 110 S 480 160, 520 160 S 600 110, 660 110" 
              fill="none" stroke="url(#flowGrad)" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
              
        <!-- Data Particles Traveling through pipeline -->
        <circle r="6" fill="#FFFFFF" filter="url(#glow)">
            <animateMotion dur="2.5s" repeatCount="indefinite" path="M 140 110 C 200 110, 230 60, 280 60 S 360 110, 400 110 S 480 160, 520 160 S 600 110, 660 110" />
        </circle>
        <circle r="5" fill="#FFFFFF" filter="url(#glow)">
            <animateMotion dur="2.5s" begin="0.8s" repeatCount="indefinite" path="M 140 110 C 200 110, 230 60, 280 60 S 360 110, 400 110 S 480 160, 520 160 S 600 110, 660 110" />
        </circle>
        <circle r="7" fill="#FFFFFF" filter="url(#glow)">
            <animateMotion dur="2.5s" begin="1.6s" repeatCount="indefinite" path="M 140 110 C 200 110, 230 60, 280 60 S 360 110, 400 110 S 480 160, 520 160 S 600 110, 660 110" />
        </circle>


        <!-- ================= PROCESSING NODES ================= -->
        
        <!-- Node 1: Transcribe -->
        <!-- Position matches the peak of the bezier curve at x=280, y=60 -->
        <g transform="translate(280, 60)">
            <circle cx="0" cy="0" r="18" fill="#0D1117" stroke="#FF512F" stroke-width="5" filter="url(#softGlow)"/>
            <circle cx="0" cy="0" r="6" fill="#FF512F" >
                <animate attributeName="r" values="6;8;6" dur="1s" repeatCount="indefinite"/>
            </circle>
            <text x="0" y="-30" font-family="sans-serif" font-size="14" font-weight="600" fill="#C9D1D9" text-anchor="middle">Transcribe</text>
        </g>

        <!-- Node 2: Translate -->
        <!-- Position matches the center of the bezier curve at x=400, y=110 -->
        <g transform="translate(400, 110)">
            <circle cx="0" cy="0" r="18" fill="#0D1117" stroke="#DD2476" stroke-width="5" filter="url(#softGlow)"/>
            <circle cx="0" cy="0" r="6" fill="#DD2476" >
                <animate attributeName="r" values="6;8;6" dur="1s" begin="0.33s" repeatCount="indefinite"/>
            </circle>
            <text x="0" y="38" font-family="sans-serif" font-size="14" font-weight="600" fill="#C9D1D9" text-anchor="middle">Translate</text>
        </g>

        <!-- Node 3: Synthesize -->
        <!-- Position matches the trough of the bezier curve at x=520, y=160 -->
        <g transform="translate(520, 160)">
            <circle cx="0" cy="0" r="18" fill="#0D1117" stroke="#00C9FF" stroke-width="5" filter="url(#softGlow)"/>
            <circle cx="0" cy="0" r="6" fill="#00C9FF" >
                <animate attributeName="r" values="6;8;6" dur="1s" begin="0.66s" repeatCount="indefinite"/>
            </circle>
            <text x="0" y="-30" font-family="sans-serif" font-size="14" font-weight="600" fill="#C9D1D9" text-anchor="middle">Synthesize</text>
        </g>

    </g>
</svg>
